<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL TRADE</title>
    <base href="/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" crossorigin>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
            position: relative;
        }
        #compose-target {
            width: 100vw;
            height: 100vh;
            display: block;
            outline: none;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 5;
        }
        #loading-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loading-indicator">Uygulama Yükleniyor...</div>
    <canvas id="compose-target"></canvas>
    <script>
        window.onload = function() {
            // Hide indicator if it stays too long
            setTimeout(function() {
                var loader = document.getElementById('loading-indicator');
                if (loader) loader.style.display = 'none';
            }, 10000);
        };
    </script>
    <script type="module" src="composeApp.js"></script>
</body>
</html>
