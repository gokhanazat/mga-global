<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL TRADE</title>
    <base href="/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" crossorigin>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
            position: relative;
        }
        #compose-target {
            width: 100vw;
            height: 100vh;
            display: block;
            outline: none;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 5;
        }
        #loading-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loading-indicator">Uygulama Yükleniyor...</div>
    <canvas id="compose-target"></canvas>
    <script>
        window.onload = function() {
            // Hide indicator if it stays too long
            setTimeout(function() {
                var loader = document.getElementById('loading-indicator');
                if (loader) loader.style.display = 'none';
            }, 10000);
        };
    </script>
    <script>
        // Webpack'in Cloudflare Insights (beacon.min.js) üzerinden yanlış path (publicPath) 
        // çözümlemesini engellemek için origin'i zorluyoruz.
        window.__webpack_public_path__ = window.location.origin + "/";

        (function() {
            const origin = window.location.origin;
            const originalFetch = window.fetch;
            window.fetch = function(input, init) {
                let url = "";
                if (typeof input === 'string') {
                    url = input;
                } else if (input instanceof URL) {
                    url = input.href;
                } else if (input instanceof Request) {
                    url = input.url;
                }

                // .wasm dosyaları için her zaman kendi origin'imizi zorluyoruz
                // Cloudflare Insights'ın (beacon.min.js) yolu bozmasını bu şekilde engelliyoruz
                if (url && url.endsWith('.wasm')) {
                    if (!url.startsWith(origin) || url.includes('cloudflareinsights.com')) {
                        const filename = url.substring(url.lastIndexOf('/') + 1);
                        const newUrl = origin + "/" + filename;
                        console.log("Wasm Origin Fix:", url, "->", newUrl);
                        if (typeof input === 'string') {
                            input = newUrl;
                        } else if (input instanceof URL) {
                            input = new URL(newUrl);
                        } else if (input instanceof Request) {
                            input = new Request(newUrl, input);
                        }
                    }
                } else if (url && url.endsWith('.js')) {
                    // Göreceli .js dosyalarını da origin'e çekiyoruz
                    if (!url.startsWith('http') && !url.startsWith('/')) {
                        const newUrl = origin + "/" + url;
                        if (typeof input === 'string') {
                            input = newUrl;
                        } else if (input instanceof URL) {
                            input = new URL(newUrl);
                        } else if (input instanceof Request) {
                            input = new Request(newUrl, input);
                        }
                    }
                }
                return originalFetch(input, init);
            };
        })();
    </script>
    <script type="module" src="composeApp.js"></script>
</body>
</html>
