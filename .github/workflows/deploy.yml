name: Fast Wasm Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew wasmJsBrowserDistribution

      - name: Prepare Deployment Directory
        run: |
          mkdir -p deploy_dist
          cp -r composeApp/build/dist/wasmJs/productionExecutable/* deploy_dist/
          
      - name: Create Cloudflare Configuration
        run: |
          cat <<EOF > deploy_dist/_headers
          /*
            Cross-Origin-Embedder-Policy: require-corp
            Cross-Origin-Opener-Policy: same-origin
            X-Content-Type-Options: nosniff
          /*.wasm
            Content-Type: application/wasm
            Cache-Control: public, max-age=31536000, immutable
          EOF
          echo "/* /index.html 200" > deploy_dist/_redirects

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy deploy_dist --project-name=itsohub
